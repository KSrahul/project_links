<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300..700;1,300..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.thumbs.css" />
  <style>
    /* Hide carousel until JS initializes to prevent left-to-center flash */
    #myCarousel:not(.is-enabled) {
      visibility: hidden;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #myCarousel {
      --f-carousel-slide-width: calc(100% - 32px);
      --f-carousel-slide-height: calc(100vh - 60px);
      max-width: 1200px;
      margin: 0 auto;
    }

    #myCarousel .f-carousel__slide {
      width: var(--f-carousel-slide-width);
      height: var(--f-carousel-slide-height);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #myCarousel .f-carousel__slide img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
    }

    #myCarousel .f-thumbs {
      --f-thumb-width: 48px;
      --f-thumb-height: 36px;
    }

    #myCarousel .f-thumbs__slide {
      max-width: 48px;
      max-height: 36px;
    }

    .f-thumbs__slide {
      width: 20px !important;
      height: 20px !important;
      padding: 1px !important;
    }

    .f-thumbs__slide img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .fancybox__toolbar {
      display: none !important;
    }

    .f-carousel__arrow {
      background: rgba(255, 255, 255, 0.9) !important;
      color: #333 !important;
      width: 44px !important;
      height: 44px !important;
      border-radius: 50% !important;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
    }

    .f-carousel__arrow:hover {
      background: #fff !important;
    }

    .f-thumbs.is-modern {
      max-height: fit-content;
    }

    body .f-carousel__toolbar__column.is-right {
      display: none;
    }
  </style>

</head>

<body>
  <!-- <nav>
        <a class="pr_links activeMenu" href="snapdeal.html">Snapdeal</a>
        <a class="pr_links" href="eazydiner.html">Eazydiner</a>
        <a class="pr_links" href="ampersand.html">Ampersand</a>
    </nav> -->
  <div class="container">
    <!-- <h1>Snapdeal</h1> -->

    <div class="f-carousel" id="myCarousel">
      <div class="f-carousel__slide" data-fancybox="gallery"
        data-src="https://ksrahul.github.io/project_links/upgradeD.png"
        data-thumb-src="https://ksrahul.github.io/project_links/upgradeD.png">
        <img src="https://ksrahul.github.io/project_links/upgradeD.png" alt="Image #4" />
      </div>
      <!-- <div class="f-carousel__slide" data-fancybox="gallery"
        data-src="https://ksrahul.github.io/project_links/scoreAdTech.jpeg"
        data-thumb-src="https://ksrahul.github.io/project_links/scoreAdTech.jpeg">
        <img src="https://ksrahul.github.io/project_links/scoreAdTech.jpeg" alt="Image #1" />
      </div> -->
      <div class="f-carousel__slide" data-fancybox="gallery"
        data-src="https://ksrahul.github.io/project_links/DesignUpgrade.png"
        data-thumb-src="https://ksrahul.github.io/project_links/DesignUpgrade.png">
        <img src="https://ksrahul.github.io/project_links/DesignUpgrade.png" alt="Image #2" />
      </div>
      <div class="f-carousel__slide" data-fancybox="gallery"
        data-src="https://ksrahul.github.io/project_links/CampaignPageLoadSpeed.png"
        data-thumb-src="https://ksrahul.github.io/project_links/CampaignPageLoadSpeed.png">
        <img src="https://ksrahul.github.io/project_links/CampaignPageLoadSpeed.png" alt="Image #3" />
      </div>
    </div>
  </div>






  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/fancybox/fancybox.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.arrows.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@6.1/dist/carousel/carousel.thumbs.umd.js"></script>
  <script>
    Carousel(
      document.getElementById("myCarousel"),
      {
        center: true,
        keyboard: true,
        Thumbs: {
          type: "classic",
          clipWidth: 60,
          clipHeight: 40,
        },
      },
      {
        Arrows,
        Thumbs,
      }
    ).init();

    Fancybox.bind("[data-fancybox]", {
      Images: {
        initialSize: "fit",
      },
      Toolbar: false,
    });
  </script>
</body>

</html>
